name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Test
        run: swift test

      - name: CLI Smoke Test
        run: |
          printf '{"name":"Ada","age":37}' | swift run matcha --encode
          printf 'name: Ada\nage: 37\n' | swift run matcha --decode

      - name: Benchmark Smoke Test
        run: swift run MatchaBenchmarks
